# ------------------------------

baseURL = "https://yuanfoudev.github.io/"
author = "yuanfou"
languageCode = "en"
DefaultContentLanguage = "zh"
paginate = 20
ignoreErrors = ["error-remote-getjson"]
enableInlineShortcodes = true

# ------------------------------

title = "元否的研究室"
theme = "paper"


[params]
  color = 'linen'
  twitter = 'yuanfoudev'
  
  #github = 'yuanfoudev'
  
  rss = true

  avatar = 'https://www.notion.so/image/https%3A%2F%2Fs3-us-west-2.amazonaws.com%2Fsecure.notion-static.com%2Fd6e23f4c-91f8-4665-8e2e-15eb24476d61%2Flogo.png?table=block&id=991a6272-a390-4ec7-8b93-1feb08e5054d&spaceId=6f061d15-8f2e-42d0-a148-068fb412b305&width=600&userId=5191ad45-3310-4476-a47f-6c90dded5c8a&cache=v2'
  name = '元否'
  bio = '未独立开发者|INTJ-A'

# ------------------------------


# 正确配置 markdown 解析设置，防止原始 html标签 被过滤。
  [highlight]
    codeFences = true
    guessSyntax = true
    lineNos = true
    lineNumbersInTable = true
    # false is a necessary configuration (https://github.com/dillonzq/LoveIt/issues/158)
    # false 是必要的设置 (https://github.com/dillonzq/LoveIt/issues/158)
    noClasses = false
  # Goldmark is from Hugo 0.60 the default library used for Markdown
  # Goldmark 是 Hugo 0.60 以来的默认 Markdown 解析库
  [goldmark]
    [goldmark.extensions]
      definitionList = true
      footnote = true
      linkify = true
      strikethrough = true
      table = true
      taskList = true
      typographer = true
    [goldmark.renderer]
      # whether to use HTML tags directly in the document
      # 是否在文档中直接使用 HTML 标签
      unsafe = true
  # Table Of Contents settings
  # 目录设置
  [tableOfContents]
    startLevel = 2
    endLevel = 6



# ------------------------------

# 配置网站菜单
[menu]

  [[menu.main]]
    identifier = "about"
    name = "About"
    url = "/about/"
    weight = 10
  [[menu.main]]
    identifier = "contact"
    name = "Contact"
    url = "/contact/"
    weight = 10
  [[menu.main]]
    identifier = "friends"
    name = "Friends"
    url = "/friends/"
    weight = 10

[taxonomies]
author = "authors"
category = "categories"
tag = "tags"
series = "series"


# misc
  disableHLJS = true
  #gravatarCdn = 'https://cdn.v2ex.com/gravatar/'         # e.g. 'https://cdn.v2ex.com/gravatar/'
  math = true                               # enable KaTex math typesetting globally